name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # EL CAMBIO MÁS IMPORTANTE: Usar Ubuntu 22.04 en lugar de latest
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get update
        
        # Instalamos las dependencias estándar de Ubuntu 22.04 (incluyendo libtool-bin)
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip \
          autoconf automake libtool libtool-bin pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev \
          libssl-dev libsqlite3-dev gettext m4
        
        # Instalamos Buildozer y forzamos Cython a una versión compatible con Kivy 2.2.1
        pip install --upgrade buildozer virtualenv
        pip install "Cython<3.0"

    - name: Build APK
      run: |
        # LIMPIEZA NUCLEAR: Borramos cualquier rastro de caché corrupta de intentos anteriores
        rm -rf .buildozer
        rm -rf ~/.buildozer
        
        # Limpiamos variables de entorno que puedan interferir
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_LATEST_HOME
        unset ANDROID_NDK_ROOT
        
        # Compilamos
        yes | buildozer -v android debug
      env:
        PYTHONIOENCODING: utf-8
        LC_ALL: C.UTF-8

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: corteoptimo-apk
        path: bin/*.apk
