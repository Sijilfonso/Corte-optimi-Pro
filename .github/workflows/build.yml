name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get update
        # Añadimos libncurses6 y aseguramos dependencias de compilación para pandas/numpy
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
          zlib1g-dev libncurses6 libncursesw6 libtinfo6 cmake libffi-dev libssl-dev \
          libsqlite3-dev
        pip install --upgrade buildozer cython virtualenv

    - name: Build APK
      run: |
        # Forzamos a Buildozer a correr en un entorno controlado
        # El comando 'yes' ahora se asegura de que Buildozer no se detenga
        yes | buildozer -v android debug
      env:
        # Esto soluciona problemas de codificación en los logs de Ubuntu 24
        PYTHONIOENCODING: utf-8
        LC_ALL: C.UTF-8

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: corteoptimo-apk
        path: bin/*.apk
