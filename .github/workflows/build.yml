name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get update
        # Añadimos m4, que es el procesador de macros que lanza el error LT_SYS
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip \
          autoconf automake libtool pkg-config zlib1g-dev libncurses6 \
          libncursesw6 libtinfo6 cmake libffi-dev libssl-dev \
          libsqlite3-dev gettext m4
        pip install --upgrade buildozer cython virtualenv

    - name: Build APK
      run: |
        # Forzamos la limpieza de la distribución anterior para que detecte libtool
        buildozer android clean
        
        # Limpiamos variables de NDK del sistema
        unset ANDROID_NDK_HOME
        unset ANDROID_NDK_LATEST_HOME
        unset ANDROID_NDK_ROOT
        
        # Compilación con log detallado
        yes | buildozer -v android debug
      env:
        PYTHONIOENCODING: utf-8
        LC_ALL: C.UTF-8

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: corteoptimo-apk
        path: bin/*.apk
